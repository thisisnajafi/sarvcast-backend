; Same as root php.ini — applies when PHP runs scripts from public/.
[PHP]
engine = On
extension_dir = "/opt/cpanel/ea-php82/root/usr/lib64/php/modules"
extension = xml
extension = dom
extension = tokenizer
extension = mbstring
extension = pdo
extension = pdo_mysql
extension = curl
extension = fileinfo
extension = zip
extension = bcmath
extension = gd
