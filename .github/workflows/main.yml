on:
  push:
    branches:
      - main
  workflow_dispatch:

name: Deploy Laravel Backend via FTP

# Prevent overlapping deploys; a new push cancels a slow in-progress upload.
concurrency:
  group: manji-backend-deploy
  cancel-in-progress: true

env:
  FTP_SERVER: "ftp.manjiapp.ir"
  FTP_USERNAME: "my@manjiapp.ir"
  FTP_PASSWORD: "Prof48017421@#"
  SITE_URL: "https://my.manjiapp.ir"
  ISSUE_LOCAL_IMPORT_TOKEN: "false"
  DEPLOY_TOKEN: "manji-ftp-deploy-x7k9m2"
  TELEGRAM_BOT_TOKEN: "7488407974:AAFl4Ek9IanbvlkKlRoikQAqdkDtFYbD0Gc"
  TELEGRAM_CHAT_ID: "-1002796302613_97"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, json, bcmath, curl, gd, zip, intl, fileinfo, pdo, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Validate Composer lock file
        run: composer validate --no-check-publish

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Package vendor directory
        run: |
          echo "Vendor size before packaging:"
          du -sh vendor
          (cd vendor && zip -r -9 -q ../vendor.zip .)
          ls -lh vendor.zip

      - name: Prepare Firebase service account for deploy bundle
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          mkdir -p storage/app
          if [ -n "${FIREBASE_SERVICE_ACCOUNT_JSON}" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > storage/app/firebase-service-account.json
            echo "OK: firebase-service-account.json from GitHub secret"
          else
            for candidate in storage/app/*-firebase-adminsdk*.json; do
              if [ -f "$candidate" ]; then
                cp "$candidate" storage/app/firebase-service-account.json
                echo "OK: copied $(basename "$candidate") to firebase-service-account.json"
                exit 0
              fi
            done
            echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON GitHub secret is not set."
            echo "Add it at: Settings → Secrets and variables → Actions → New repository secret"
            echo "Name: FIREBASE_SERVICE_ACCOUNT_JSON"
            echo "Value: full JSON from Firebase Console → Project settings → Service accounts → Generate new private key"
            echo "Use the manjiapp-3028e project key (same as storage/app/*-firebase-adminsdk*.json locally)."
            exit 1
          fi
          php -r 'json_decode(file_get_contents("storage/app/firebase-service-account.json")); if (json_last_error() !== JSON_ERROR_NONE) { fwrite(STDERR, "Invalid JSON in firebase service account\n"); exit(1); }'
          echo "OK: firebase-service-account.json is valid JSON"

      - name: Prepare deploy bundle
        run: bash scripts/prepare-ftp-deploy.sh
        env:
          DEPLOY_EXTRACT_TOKEN: ${{ env.DEPLOY_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Prepare production .env for deploy
        run: bash scripts/prepare-production-env.sh
        env:
          PRODUCTION_DOTENV: ${{ secrets.PRODUCTION_DOTENV }}

      - name: Report deploy bundle size
        run: |
          du -sh deploy-upload/deploy.zip deploy-upload/vendor.zip
          ls -lh deploy-upload/

      - name: Verify Firebase file in deploy bundle
        run: |
          set -euo pipefail
          if ! unzip -l deploy-upload/deploy.zip | grep -q 'storage/app/firebase-service-account.json'; then
            echo "::error::storage/app/firebase-service-account.json missing from deploy.zip"
            exit 1
          fi
          echo "OK: firebase-service-account.json is in deploy.zip"

      - name: Verify migration files are present in deploy bundle
        run: |
          test -f database/migrations/2026_06_27_100000_add_onboarding_fields_to_users_table.php
          test -f database/migrations/2026_06_27_100001_set_profile_completion_needed_for_incomplete_users.php
          test -f database/migrations/2026_06_27_100002_create_search_histories_table.php
          test -f database/migrations/2026_06_27_120000_create_sponsors_table.php
          test -f database/migrations/2026_06_27_120001_add_sponsor_id_to_stories_table.php
          test -f database/migrations/2026_06_30_120004_fix_stories_sponsor_id_foreign_key.php
          test -f database/migrations/2026_06_29_100000_create_activity_logs_table.php
          test -f database/migrations/2026_06_29_110000_add_event_uuid_to_activity_logs_table.php
          test -f database/migrations/2026_06_30_100000_add_archived_status_to_episodes_table.php
          test -f database/migrations/2026_07_01_180000_add_featured_fields_to_stories_table.php
          test -f database/migrations/2026_01_02_125031_create_user_devices_table.php
          test -f database/migrations/2026_07_01_190000_extend_fcm_token_on_user_devices_table.php
          test -f database/migrations/2026_07_01_200000_extend_app_version_on_user_devices_table.php
          test -f database/migrations/2026_06_28_120000_create_team_members_table.php
          test -f config/activity_log.php
          echo "Required migration files and config present in deploy bundle"

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Prepare critical FTP directories
        run: |
          set -euo pipefail
          echo "Ensuring nested FTP paths exist (fixes 550 on public/js/admin, app/Notifications, etc.)"

          lftp -u "${{ env.FTP_USERNAME }},${{ env.FTP_PASSWORD }}" "${{ env.FTP_SERVER }}" -e "
            set ftp:passive-mode true;
            set ftp:ssl-allow true;
            set ftp:ssl-force true;
            set ssl:verify-certificate no;
            set ssl:check-hostname no;
            set net:timeout 120;
            set net:max-retries 5;
            set cmd:fail-exit no;
            cd /;
            mkdir -p app/Notifications;
            cd public/js;
            rm -f admin;
            rmdir admin;
            mkdir -p admin;
            cd /;
            bye;
          "
          echo "OK: critical FTP directories prepared"

      - name: Deploy via FTP (fast zip upload)
        run: |
          set -euo pipefail
          echo "Fast deploy: uploading deploy.zip + vendor.zip + extract-deploy.php"

          lftp -u "${{ env.FTP_USERNAME }},${{ env.FTP_PASSWORD }}" "${{ env.FTP_SERVER }}" -e "
            set ftp:passive-mode true;
            set ftp:ssl-allow true;
            set ftp:ssl-force true;
            set ssl:verify-certificate no;
            set ssl:check-hostname no;
            set net:timeout 120;
            set net:max-retries 5;
            set net:reconnect-interval-base 10;
            set cmd:fail-exit yes;
            lcd deploy-upload;
            cd /;
            put -O . deploy.zip;
            put -O . vendor.zip;
            put -O . htaccess.deploy;
            mirror -R --parallel=3 public public;
            bye;
          "

          echo "Extracting deploy archive on server..."
          EXTRACT_OUT=$(curl -fsS --max-time 600 \
            "${{ env.SITE_URL }}/extract-deploy.php?token=${{ env.DEPLOY_TOKEN }}")
          echo "$EXTRACT_OUT"

          if ! echo "$EXTRACT_OUT" | grep -q "Laravel deploy extracted successfully"; then
            echo "::error::Server extract failed"
            exit 1
          fi

          echo "OK: fast tar deploy completed"

      - name: Upload Firebase service account to server (FTP)
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON secret is required"
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-service-account.json
          php -r 'json_decode(file_get_contents("/tmp/firebase-service-account.json")); if (json_last_error() !== JSON_ERROR_NONE) { fwrite(STDERR, "Invalid JSON\n"); exit(1); }'

          lftp -u "${{ env.FTP_USERNAME }},${{ env.FTP_PASSWORD }}" "${{ env.FTP_SERVER }}" -e "
            set ftp:passive-mode true;
            set ftp:ssl-allow true;
            set ftp:ssl-force true;
            set ssl:verify-certificate no;
            set ssl:check-hostname no;
            set net:timeout 120;
            set net:max-retries 5;
            set cmd:fail-exit yes;
            lcd /tmp;
            cd /;
            mkdir -p storage/app;
            put -O storage/app firebase-service-account.json;
            bye;
          "
          echo "OK: firebase-service-account.json uploaded to storage/app/"

      - name: Upload production .env to server (FTP)
        run: |
          set -euo pipefail
          test -f deploy-upload/.env
          lftp -u "${{ env.FTP_USERNAME }},${{ env.FTP_PASSWORD }}" "${{ env.FTP_SERVER }}" -e "
            set ftp:passive-mode true;
            set ftp:ssl-allow true;
            set ftp:ssl-force true;
            set ssl:verify-certificate no;
            set ssl:check-hostname no;
            set net:timeout 120;
            set net:max-retries 5;
            set cmd:fail-exit yes;
            lcd deploy-upload;
            cd /;
            put -O . .env;
            bye;
          "
          echo "OK: production .env uploaded"

      - name: Run php artisan config:clear on server
        run: |
          echo "::group::php artisan config:clear (via deploy helper)"
          set +e
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            "${{ env.SITE_URL }}/_deploy_helper.php?token=${{ env.DEPLOY_TOKEN }}&only=config_clear" \
            --max-time 300 --connect-timeout 30)
          CURL_EXIT=$?
          set -e

          if [[ "$CURL_EXIT" -ne 0 ]]; then
            echo "::error::Could not reach deploy helper (config:clear)"
            echo "::endgroup::"
            exit 1
          fi

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP status: $HTTP_CODE"
          echo "$BODY" | jq -r '.results[]?' 2>/dev/null | while read -r line; do echo "  - $line"; done

          if [[ "$HTTP_CODE" != "200" ]] || [[ "$(echo "$BODY" | jq -r '.status // "unknown"')" != "success" ]]; then
            echo "Raw response: $BODY"
            echo "::error::php artisan config:clear failed on server"
            echo "::endgroup::"
            exit 1
          fi

          if ! echo "$BODY" | jq -r '.results[]?' 2>/dev/null | grep -qE "php artisan config:clear OK"; then
            echo "::error::php artisan config:clear did not report success"
            echo "::endgroup::"
            exit 1
          fi

          echo "✅ php artisan config:clear completed"
          echo "::endgroup::"

      - name: Run php artisan firebase:verify --clear-cache on server
        run: |
          echo "::group::php artisan firebase:verify --clear-cache (via deploy helper)"
          set +e
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            "${{ env.SITE_URL }}/_deploy_helper.php?token=${{ env.DEPLOY_TOKEN }}&only=firebase_verify" \
            --max-time 300 --connect-timeout 30)
          CURL_EXIT=$?
          set -e

          if [[ "$CURL_EXIT" -ne 0 ]]; then
            echo "::error::Could not reach deploy helper (firebase:verify)"
            echo "::endgroup::"
            exit 1
          fi

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP status: $HTTP_CODE"
          echo "$BODY" | jq -r '.results[]?' 2>/dev/null | while read -r line; do echo "  - $line"; done

          if [[ "$HTTP_CODE" != "200" ]] || [[ "$(echo "$BODY" | jq -r '.status // "unknown"')" != "success" ]]; then
            echo "::error::php artisan firebase:verify --clear-cache failed on server (check service account JSON and FCM IAM)"
            echo "::endgroup::"
            exit 1
          fi

          if echo "$BODY" | jq -r '.results[]?' 2>/dev/null | grep -q "php artisan firebase:verify --clear-cache FAILED"; then
            echo "::error::php artisan firebase:verify --clear-cache failed on server"
            echo "::endgroup::"
            exit 1
          fi

          if ! echo "$BODY" | jq -r '.results[]?' 2>/dev/null | grep -qE "php artisan firebase:verify --clear-cache OK"; then
            echo "::error::php artisan firebase:verify --clear-cache did not report success"
            echo "::endgroup::"
            exit 1
          fi

          echo "✅ php artisan firebase:verify --clear-cache completed"
          echo "::endgroup::"

      - name: Run php artisan migrate --force on server
        run: |
          echo "::group::Post-deploy server tasks (via deploy helper)"
          echo "Post-deploy on server: extract vendor.zip, php artisan migrate --force, RolePermissionSeeder, cache rebuild"

          set +e
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            "${{ env.SITE_URL }}/_deploy_helper.php?token=${{ env.DEPLOY_TOKEN }}" \
            --max-time 600 --connect-timeout 30)
          CURL_EXIT=$?
          set -e

          if [[ "$CURL_EXIT" -ne 0 ]]; then
            echo "::error::Could not reach deploy helper at ${{ env.SITE_URL }} (curl exit ${CURL_EXIT}). Check DNS/SSL for the server URL used in CI."
            echo "::endgroup::"
            exit 1
          fi

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP status: $HTTP_CODE"
          echo "Raw response: $BODY"

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::error::Deploy helper returned HTTP $HTTP_CODE"
            echo "::endgroup::"
            exit 1
          fi

          STATUS=$(echo "$BODY" | jq -r '.status // "unknown"')
          echo "Helper status: $STATUS"
          echo "Command results:"
          echo "$BODY" | jq -r '.results[]?' 2>/dev/null | while read -r line; do
            echo "  - $line"
          done

          if [[ "$STATUS" != "success" ]]; then
            echo "::error::Server post-deploy failed"
            echo "::endgroup::"
            exit 1
          fi

          if echo "$BODY" | jq -r '.results[]?' 2>/dev/null | grep -q "php artisan migrate --force FAILED"; then
            echo "::error::php artisan migrate --force failed on server"
            echo "::endgroup::"
            exit 1
          fi

          if ! echo "$BODY" | jq -r '.results[]?' 2>/dev/null | grep -qE "php artisan migrate --force OK"; then
            echo "::error::php artisan migrate --force did not report success"
            echo "::endgroup::"
            exit 1
          fi

          if echo "$BODY" | jq -r '.results[]?' 2>/dev/null | grep -q "activity_logs verification FAILED"; then
            echo "::error::activity_logs migration verification failed on server"
            echo "::endgroup::"
            exit 1
          fi

          if echo "$BODY" | jq -r '.results[]?' 2>/dev/null | grep -q "audit permissions verification FAILED"; then
            echo "::error::audit permissions missing after RolePermissionSeeder"
            echo "::endgroup::"
            exit 1
          fi

          PENDING=$(echo "$BODY" | jq -r '.results[]?' 2>/dev/null | grep -c "Pending" || true)
          if [[ "$PENDING" -gt 0 ]]; then
            echo "⚠️ $PENDING pending migration(s) reported before migrate step"
          fi

          echo "✅ Post-deploy completed: migrations applied, caches rebuilt"
          echo "::endgroup::"

      - name: Verify production site responds
        run: |
          set -euo pipefail
          for path in "/" "/api/v1/health"; do
            code=$(curl -sS -o /tmp/manji-body.txt -w "%{http_code}" \
              "${{ env.SITE_URL }}${path}" --max-time 60)
            echo "${{ env.SITE_URL }}${path} → HTTP ${code}"
            if [[ "${path}" == "/" && "${code}" == "403" ]]; then
              echo "::error::Homepage still returns 403 — check root .htaccess routes / to public/index.php"
              exit 1
            fi
            if [[ "${path}" == "/" && ! "${code}" =~ ^(200|302|301)$ ]]; then
              echo "::error::Homepage returned unexpected HTTP ${code}"
              exit 1
            fi
            if [[ "${path}" == "/api/v1/health" && ! "${code}" =~ ^(200|503)$ ]]; then
              echo "::error::Health endpoint returned HTTP ${code}"
              head -c 500 /tmp/manji-body.txt || true
              exit 1
            fi
          done
          echo "OK: site smoke checks passed"

      # Token must be created ON THE SERVER (CI runner has no MySQL). Set env
      # ISSUE_LOCAL_IMPORT_TOKEN to "true" to run after each deploy (rotates token every deploy).
      - name: Issue local import API token on server
        if: env.ISSUE_LOCAL_IMPORT_TOKEN == 'true'
        id: local_import_token
        run: |
          echo "::group::Issue local import token via deploy helper"
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            "${{ env.SITE_URL }}/_deploy_helper.php?token=${{ env.DEPLOY_TOKEN }}&issue_local_import_token=1&phone=09136708883" \
            --max-time 120 --connect-timeout 30)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP status: $HTTP_CODE"
          TOKEN=$(echo "$BODY" | jq -r '.local_import.token // empty')
          if [[ -n "$TOKEN" ]]; then
            # Do NOT use ::add-mask:: here — the token must be copyable from this log once.
            ENV_FILE="local-import.env"
            {
              echo "LOCAL_IMPORT_API_BASE_URL=${{ env.SITE_URL }}/api/admin"
              echo "LOCAL_IMPORT_API_TOKEN=${TOKEN}"
            } > "$ENV_FILE"
            echo "issued=true" >> "$GITHUB_OUTPUT"
            echo ""
            echo "========== LOCAL .env (copy into manji-laravel/.env on your PC) =========="
            cat "$ENV_FILE"
            echo "=========================================================================="
            echo ""
            echo "If GitHub masks the token above, download the workflow artifact: local-import-env"
            TOKEN_B64=$(printf '%s' "$TOKEN" | base64 -w0)
            echo "Or decode from base64: echo ${TOKEN_B64} | base64 -d"
          else
            echo "$BODY" | jq .
            echo "::warning::Local import token was not issued — check deploy helper results"
          fi
          echo "::endgroup::"

      - name: Upload local import env artifact
        if: env.ISSUE_LOCAL_IMPORT_TOKEN == 'true' && steps.local_import_token.outputs.issued == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: local-import-env
          path: local-import.env
          retention-days: 2
          if-no-files-found: error

      - name: Notify Telegram (success)
        if: success()
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -c 200)
          COMMIT_HASH=$(git rev-parse --short HEAD)
          AUTHOR=$(git log -1 --pretty=%an)

          TEXT="✅ *Manji Backend Deployed*

          📦 Commit: \`${COMMIT_HASH}\`
          👤 Author: ${AUTHOR}
          📝 ${COMMIT_MSG}

          🔗 ${{ env.SITE_URL }}"

          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
            -d text="$TEXT" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview=true || true

      - name: Notify Telegram (failure)
        if: failure()
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          AUTHOR=$(git log -1 --pretty=%an)

          TEXT="❌ *Manji Backend Deploy Failed*

          📦 Commit: \`${COMMIT_HASH}\`
          👤 Author: ${AUTHOR}

          🔗 [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
            -d text="$TEXT" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview=true || true
