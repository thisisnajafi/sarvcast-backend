on:
  push:
    branches:
      - main

name: Deploy Laravel Backend via FTP

# Prevent overlapping deploys; a new push cancels a slow in-progress upload.
concurrency:
  group: manji-backend-deploy
  cancel-in-progress: true

env:
  FTP_SERVER: "ftp.sarvcast.ir"
  FTP_USERNAME: "my@sarvcast.ir"
  FTP_PASSWORD: "Prof48017421@#"
  SITE_URL: "https://my.sarvcast.ir"
  ISSUE_LOCAL_IMPORT_TOKEN: "true"
  DEPLOY_TOKEN: "manji-ftp-deploy-x7k9m2"
  TELEGRAM_BOT_TOKEN: "7488407974:AAFl4Ek9IanbvlkKlRoikQAqdkDtFYbD0Gc"
  TELEGRAM_CHAT_ID: "-1002796302613_97"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, json, bcmath, curl, gd, zip, intl, fileinfo, pdo, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Validate Composer lock file
        run: composer validate --no-check-publish

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Package vendor directory
        run: |
          echo "Vendor size before packaging:"
          du -sh vendor
          (cd vendor && zip -r -9 -q ../vendor.zip .)
          ls -lh vendor.zip

      - name: Verify migration files are present in deploy bundle
        run: |
          test -f database/migrations/2026_06_27_100000_add_onboarding_fields_to_users_table.php
          test -f database/migrations/2026_06_27_100001_set_profile_completion_needed_for_incomplete_users.php
          test -f database/migrations/2026_06_27_100002_create_search_histories_table.php
          test -f database/migrations/2026_06_27_120000_create_sponsors_table.php
          test -f database/migrations/2026_06_27_120001_add_sponsor_id_to_stories_table.php
          test -f database/migrations/2026_06_30_120004_fix_stories_sponsor_id_foreign_key.php
          test -f database/migrations/2026_06_29_100000_create_activity_logs_table.php
          test -f database/migrations/2026_06_29_110000_add_event_uuid_to_activity_logs_table.php
          test -f database/migrations/2026_06_30_100000_add_archived_status_to_episodes_table.php
          test -f config/activity_log.php
          echo "Required migration files and config present in deploy bundle"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          server-dir: /
          timeout: 600000
          log-level: minimal
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            vendor/**
            .env
            .env.*
            .github/**
            tests/**
            storage/logs/**
            storage/framework/sessions/**
            storage/framework/views/**
            storage/framework/cache/data/**

      - name: Run php artisan migrate --force on server
        run: |
          echo "::group::php artisan migrate --force (via deploy helper)"
          echo "Post-deploy on server: extract vendor.zip, php artisan migrate --force, RolePermissionSeeder, cache rebuild"

          set +e
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            "${{ env.SITE_URL }}/_deploy_helper.php?token=${{ env.DEPLOY_TOKEN }}" \
            --max-time 600 --connect-timeout 30)
          CURL_EXIT=$?
          set -e

          if [[ "$CURL_EXIT" -ne 0 ]]; then
            echo "::error::Could not reach deploy helper at ${{ env.SITE_URL }} (curl exit ${CURL_EXIT}). Check DNS/SSL for the server URL used in CI."
            echo "::endgroup::"
            exit 1
          fi

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP status: $HTTP_CODE"
          echo "Raw response: $BODY"

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::error::Deploy helper returned HTTP $HTTP_CODE"
            echo "::endgroup::"
            exit 1
          fi

          STATUS=$(echo "$BODY" | jq -r '.status // "unknown"')
          echo "Helper status: $STATUS"
          echo "Command results:"
          echo "$BODY" | jq -r '.results[]?' 2>/dev/null | while read -r line; do
            echo "  - $line"
          done

          if [[ "$STATUS" != "success" ]]; then
            echo "::error::Server post-deploy failed"
            echo "::endgroup::"
            exit 1
          fi

          if echo "$BODY" | jq -r '.results[]?' 2>/dev/null | grep -q "php artisan migrate --force FAILED"; then
            echo "::error::php artisan migrate --force failed on server"
            echo "::endgroup::"
            exit 1
          fi

          if ! echo "$BODY" | jq -r '.results[]?' 2>/dev/null | grep -qE "php artisan migrate --force OK"; then
            echo "::error::php artisan migrate --force did not report success"
            echo "::endgroup::"
            exit 1
          fi

          if echo "$BODY" | jq -r '.results[]?' 2>/dev/null | grep -q "activity_logs verification FAILED"; then
            echo "::error::activity_logs migration verification failed on server"
            echo "::endgroup::"
            exit 1
          fi

          if echo "$BODY" | jq -r '.results[]?' 2>/dev/null | grep -q "audit permissions verification FAILED"; then
            echo "::error::audit permissions missing after RolePermissionSeeder"
            echo "::endgroup::"
            exit 1
          fi

          PENDING=$(echo "$BODY" | jq -r '.results[]?' 2>/dev/null | grep -c "Pending" || true)
          if [[ "$PENDING" -gt 0 ]]; then
            echo "⚠️ $PENDING pending migration(s) reported before migrate step"
          fi

          echo "✅ php artisan migrate --force completed; dependencies installed and caches rebuilt"
          echo "::endgroup::"

      # Token must be created ON THE SERVER (CI runner has no MySQL). Set env
      # ISSUE_LOCAL_IMPORT_TOKEN to "true" to run after each deploy (rotates token every deploy).
      - name: Issue local import API token on server
        if: env.ISSUE_LOCAL_IMPORT_TOKEN == 'true'
        id: local_import_token
        run: |
          echo "::group::Issue local import token via deploy helper"
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            "${{ env.SITE_URL }}/_deploy_helper.php?token=${{ env.DEPLOY_TOKEN }}&issue_local_import_token=1&phone=09136708883" \
            --max-time 120 --connect-timeout 30)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP status: $HTTP_CODE"
          TOKEN=$(echo "$BODY" | jq -r '.local_import.token // empty')
          if [[ -n "$TOKEN" ]]; then
            # Do NOT use ::add-mask:: here — the token must be copyable from this log once.
            ENV_FILE="local-import.env"
            {
              echo "LOCAL_IMPORT_API_BASE_URL=${{ env.SITE_URL }}/api/admin"
              echo "LOCAL_IMPORT_API_TOKEN=${TOKEN}"
            } > "$ENV_FILE"
            echo "issued=true" >> "$GITHUB_OUTPUT"
            echo ""
            echo "========== LOCAL .env (copy into manji-laravel/.env on your PC) =========="
            cat "$ENV_FILE"
            echo "=========================================================================="
            echo ""
            echo "If GitHub masks the token above, download the workflow artifact: local-import-env"
            TOKEN_B64=$(printf '%s' "$TOKEN" | base64 -w0)
            echo "Or decode from base64: echo ${TOKEN_B64} | base64 -d"
          else
            echo "$BODY" | jq .
            echo "::warning::Local import token was not issued — check deploy helper results"
          fi
          echo "::endgroup::"

      - name: Upload local import env artifact
        if: env.ISSUE_LOCAL_IMPORT_TOKEN == 'true' && steps.local_import_token.outputs.issued == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: local-import-env
          path: local-import.env
          retention-days: 2
          if-no-files-found: error

      - name: Notify Telegram (success)
        if: success()
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -c 200)
          COMMIT_HASH=$(git rev-parse --short HEAD)
          AUTHOR=$(git log -1 --pretty=%an)

          TEXT="✅ *Manji Backend Deployed*

          📦 Commit: \`${COMMIT_HASH}\`
          👤 Author: ${AUTHOR}
          📝 ${COMMIT_MSG}

          🔗 ${{ env.SITE_URL }}"

          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
            -d text="$TEXT" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview=true || true

      - name: Notify Telegram (failure)
        if: failure()
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          AUTHOR=$(git log -1 --pretty=%an)

          TEXT="❌ *Manji Backend Deploy Failed*

          📦 Commit: \`${COMMIT_HASH}\`
          👤 Author: ${AUTHOR}

          🔗 [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
            -d text="$TEXT" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview=true || true
