on:
  push:
    branches:
      - main

name: Deploy Laravel Backend via FTP

# Prevent overlapping deploys; a new push cancels a slow in-progress upload.
concurrency:
  group: sarvcast-backend-deploy
  cancel-in-progress: true

env:
  FTP_SERVER: "ftp.sarvcast.ir"
  FTP_USERNAME: "my@sarvcast.ir"
  FTP_PASSWORD: "Prof48017421@#"
  SITE_URL: "https://my.sarvcast.ir"
  DEPLOY_TOKEN: "sarvcast-ftp-deploy-x7k9m2"
  TELEGRAM_BOT_TOKEN: "7488407974:AAFl4Ek9IanbvlkKlRoikQAqdkDtFYbD0Gc"
  TELEGRAM_CHAT_ID: "-1002796302613_97"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, json, bcmath, curl, gd, zip, intl, fileinfo, pdo, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Validate Composer lock file
        run: composer validate --strict --no-check-publish

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          server-dir: /
          timeout: 600000
          log-level: minimal
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            vendor/**
            .env
            .env.*
            .github/**
            tests/**
            storage/logs/**
            storage/framework/sessions/**
            storage/framework/views/**
            storage/framework/cache/data/**

      - name: Install dependencies and cache on server
        run: |
          echo "::group::Install dependencies and cache configurations (server)"
          echo "Calling deploy helper: composer install, clear-compiled, config:cache, route:cache, view:cache, optimize, storage:link"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${{ env.SITE_URL }}/_deploy_helper.php?token=${{ env.DEPLOY_TOKEN }}" \
            --max-time 300 --connect-timeout 15)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP status: $HTTP_CODE"

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::warning::Deploy helper returned HTTP $HTTP_CODE — may need manual cache clear"
            echo "Raw response: $BODY"
            echo "::endgroup::"
            exit 1
          fi

          if command -v jq &>/dev/null; then
            STATUS=$(echo "$BODY" | jq -r '.status // "unknown"')
            echo "Helper status: $STATUS"
            echo "Command results:"
            echo "$BODY" | jq -r '.results[]?' 2>/dev/null | while read -r line; do
              echo "  - $line"
              if echo "$line" | grep -qE "FAILED|failed"; then
                echo "::warning::$line"
              fi
            done
            FAILED=$(echo "$BODY" | jq -r '[.results[]? | select(. | test("FAILED|failed"))] | length' 2>/dev/null || echo "0")
            if [[ "$FAILED" != "0" ]]; then
              echo "::error::Server post-deploy failed: $FAILED step(s) failed"
              echo "::endgroup::"
              exit 1
            fi
          else
            echo "Raw response: $BODY"
          fi

          echo "✅ Dependencies installed and caches rebuilt on server"
          echo "::endgroup::"

      - name: Notify Telegram (success)
        if: success()
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -c 200)
          COMMIT_HASH=$(git rev-parse --short HEAD)
          AUTHOR=$(git log -1 --pretty=%an)

          TEXT="✅ *SarvCast Backend Deployed*

          📦 Commit: \`${COMMIT_HASH}\`
          👤 Author: ${AUTHOR}
          📝 ${COMMIT_MSG}

          🔗 ${{ env.SITE_URL }}"

          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
            -d text="$TEXT" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview=true || true

      - name: Notify Telegram (failure)
        if: failure()
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          AUTHOR=$(git log -1 --pretty=%an)

          TEXT="❌ *SarvCast Backend Deploy Failed*

          📦 Commit: \`${COMMIT_HASH}\`
          👤 Author: ${AUTHOR}

          🔗 [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
            -d text="$TEXT" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview=true || true
