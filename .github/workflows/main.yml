name: SarvCast Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Setup MySQL
        uses: mirromutth/mysql-action@v1.1
        with:
          mysql version: '8.0'
          mysql root password: 'iWY]RgUhnqiu'
          mysql database: 'h273779_lgb'
          mysql user: 'h273779_lgb'
          mysql host: 'localhost'
          mysql password: 'iWY]RgUhnqiu'

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install dependencies
        env:
          BROADCAST_DRIVER: log
          PUSHER_APP_KEY: dummy_key
          PUSHER_APP_SECRET: dummy_secret
          PUSHER_APP_ID: dummy_id
          PUSHER_APP_CLUSTER: mt1
        run: composer install

      # - name: Copy .env
      #   env:
      #     BROADCAST_DRIVER: log
      #     PUSHER_APP_KEY: dummy_key
      #     PUSHER_APP_SECRET: dummy_secret
      #     PUSHER_APP_ID: dummy_id
      #     PUSHER_APP_CLUSTER: mt1
      #   run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      # - name: Configure database for GitHub Actions
      #   run: |
      #     # Update .env file with GitHub Actions database credentials
      #     sed -i 's/DB_HOST=.*/DB_HOST=localhost/' .env
      #     sed -i 's/DB_PORT=.*/DB_PORT=3306/' .env
      #     sed -i 's/DB_DATABASE=.*/DB_DATABASE=h273779_lgb/' .env
      #     sed -i 's/DB_USERNAME=.*/DB_USERNAME=h273779_lgb/' .env
      #     sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=iWY]RgUhnqiu/' .env

      - name: Generate key
        env:
          BROADCAST_DRIVER: log
          PUSHER_APP_KEY: dummy_key
          PUSHER_APP_SECRET: dummy_secret
          PUSHER_APP_ID: dummy_id
          PUSHER_APP_CLUSTER: mt1
        run: php artisan key:generate --force

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Create Public Images Directories
        run: |
          echo "📁 Creating public images directories..."
          mkdir -p public/images/categories
          mkdir -p public/images/stories
          mkdir -p public/images/episodes
          mkdir -p public/images/people
          mkdir -p public/images/users
          mkdir -p public/images/playlists
          mkdir -p public/images/timeline
          echo "✅ Public images directories created successfully"

      - name: Set Public Images Permissions
        run: |
          echo "🔐 Setting public images permissions..."
          chmod -R 755 public/images
          echo "✅ Public images permissions set successfully"

      - name: Test Database Connection
        run: |
          echo "🔍 Testing database connection..."
          php artisan tinker --execute="echo 'Database connection: ' . (DB::connection()->getPdo() ? 'OK' : 'FAILED') . PHP_EOL;"


      - name: Pre-deployment Cache Clear
        run: |
          echo "🧹 Clearing pre-deployment caches..."
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear
          echo "✅ Pre-deployment caches cleared"

      - name: Setup SSH Authentication
        run: |
          echo "🔑 Setting up SSH authentication..."
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Add server to known hosts
          echo "🔍 Adding server to known hosts..."
          ssh-keyscan -H ${{ secrets.SSH_HOST }} -p ${{ secrets.SSH_PORT || 22 }} >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts

          # Install sshpass for password authentication
          echo "📦 Installing sshpass for password authentication..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass

          # Test SSH connection with password
          echo "🔍 Testing SSH connection with password..."
          if sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            -o PasswordAuthentication=yes \
            -o PubkeyAuthentication=no \
            -o ConnectTimeout=10 \
            -p ${{ secrets.SSH_PORT || 22 }} \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "echo 'SSH connection successful'" 2>&1; then
            echo "✅ SSH connection test successful"
          else
            echo "❌ SSH connection test failed"
            echo ""
            echo "Troubleshooting steps:"
            echo "1. Verify SSH_PASSWORD secret is correct"
            echo "2. Check SSH_USERNAME and SSH_HOST are correct"
            echo "3. Verify SSH port is correct (default: 22)"
            echo "4. Check server allows password authentication"
            echo "5. Check server firewall allows SSH connections"
            exit 1
          fi

          echo "✅ SSH authentication configured successfully"

      - name: Install rsync on remote server
        run: |
          echo "📦 Checking/installing rsync on remote server..."

          # Check if rsync is already installed
          RSYNC_CHECK=$(sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            -o PasswordAuthentication=yes \
            -o PubkeyAuthentication=no \
            -o ConnectTimeout=10 \
            -p ${{ secrets.SSH_PORT || 22 }} \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "command -v rsync" 2>&1)

          if echo "$RSYNC_CHECK" | grep -q "rsync"; then
            echo "✅ rsync is already installed"
            sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
              -o StrictHostKeyChecking=no \
              -o PasswordAuthentication=yes \
              -o PubkeyAuthentication=no \
              -o ConnectTimeout=10 \
              -p ${{ secrets.SSH_PORT || 22 }} \
              ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
              "rsync --version | head -1"
          else
            echo "⚠️ rsync not found. Attempting to install..."

            # Try installation with sudo first, then without sudo
            INSTALL_RESULT=$(sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
              -o StrictHostKeyChecking=no \
              -o PasswordAuthentication=yes \
              -o PubkeyAuthentication=no \
              -o ConnectTimeout=10 \
              -p ${{ secrets.SSH_PORT || 22 }} \
              ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
              "if command -v sudo >/dev/null 2>&1; then \
                if command -v apt-get >/dev/null 2>&1; then \
                  sudo apt-get update -qq && sudo apt-get install -y -qq rsync 2>&1; \
                elif command -v yum >/dev/null 2>&1; then \
                  sudo yum install -y -q rsync 2>&1; \
                elif command -v dnf >/dev/null 2>&1; then \
                  sudo dnf install -y -q rsync 2>&1; \
                elif command -v apk >/dev/null 2>&1; then \
                  sudo apk add -q rsync 2>&1; \
                fi \
              elif command -v apt-get >/dev/null 2>&1; then \
                apt-get update -qq && apt-get install -y -qq rsync 2>&1; \
              elif command -v yum >/dev/null 2>&1; then \
                yum install -y -q rsync 2>&1; \
              elif command -v dnf >/dev/null 2>&1; then \
                dnf install -y -q rsync 2>&1; \
              elif command -v apk >/dev/null 2>&1; then \
                apk add -q rsync 2>&1; \
              else \
                echo 'ERROR: Could not detect package manager or install rsync.'; \
                exit 1; \
              fi" 2>&1)

            # Check if installation was successful
            if sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
              -o StrictHostKeyChecking=no \
              -o PasswordAuthentication=yes \
              -o PubkeyAuthentication=no \
              -o ConnectTimeout=10 \
              -p ${{ secrets.SSH_PORT || 22 }} \
              ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
              "command -v rsync >/dev/null 2>&1"; then
              echo "✅ rsync installed successfully"
              sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
                -o StrictHostKeyChecking=no \
                -o PasswordAuthentication=yes \
                -o PubkeyAuthentication=no \
                -o ConnectTimeout=10 \
                -p ${{ secrets.SSH_PORT || 22 }} \
                ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
                "rsync --version | head -1"
            else
              echo "❌ Failed to install rsync automatically"
              echo "Installation output: $INSTALL_RESULT"
              echo ""
              echo "Please install rsync manually on your server:"
              echo "  - For Ubuntu/Debian: apt-get install rsync"
              echo "  - For CentOS/RHEL: yum install rsync"
              echo "  - Or contact your hosting provider to install rsync"
              exit 1
            fi
          fi

          echo "✅ rsync installation check completed"

      - name: 📂 Sync files via SSH (rsync)
        run: |
          echo "📤 Syncing files to server via SSH (rsync)..."
          echo "📍 Target: ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.APP_PATH || '/public_html/my' }}/"

          # Use rsync with password authentication via sshpass
          rsync -avz --delete --progress \
            -e "sshpass -p '${{ secrets.SSH_PASSWORD }}' ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -o PasswordAuthentication=yes -o PubkeyAuthentication=no -p ${{ secrets.SSH_PORT || 22 }}" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='phpunit.xml' \
            --exclude='*.md' \
            --exclude='.styleci.yml' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='bootstrap/cache/*' \
            --exclude='vendor' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            --exclude='Homestead.yaml' \
            --exclude='Homestead.json' \
            --exclude='Vagrantfile' \
            --exclude='*.log' \
            ./ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.APP_PATH || '/public_html/my' }}/

          if [ $? -eq 0 ]; then
            echo "✅ Files synced successfully!"
          else
            echo "❌ File sync failed!"
            exit 1
          fi

      - name: Run Post-Deployment Commands via SSH
        run: |
          echo "🚀 Running post-deployment commands via SSH..."

          APP_PATH="${{ secrets.APP_PATH || '/public_html/my' }}"

          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            -o PasswordAuthentication=yes \
            -o PubkeyAuthentication=no \
            -o ConnectTimeout=10 \
            -p ${{ secrets.SSH_PORT || 22 }} \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "cd ${APP_PATH} && \
            echo '🚀 Starting post-deployment setup...' && \
            echo '📦 Installing/updating Composer dependencies...' && \
            composer install --no-dev --optimize-autoloader --no-interaction && \
            echo '🧹 Clearing Laravel caches...' && \
            php artisan config:clear && \
            php artisan route:clear && \
            php artisan view:clear && \
            php artisan cache:clear && \
            echo '🔄 Running database migrations...' && \
            php artisan migrate --force && \
            echo '⚡ Optimizing Laravel for production...' && \
            php artisan config:cache && \
            php artisan route:cache && \
            php artisan view:cache && \
            php artisan optimize && \
            echo '🔐 Setting proper permissions...' && \
            chmod -R 755 storage bootstrap/cache && \
            chmod -R 755 public/images && \
            echo '🔗 Creating storage symlink (if needed)...' && \
            php artisan storage:link || true && \
            echo '✅ Post-deployment setup completed successfully!'"

      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Cleanup completed"

      - name: Verify deployment
        run: |
          echo "✅ Deployment verification..."
          echo "📋 Deployment completed successfully!"
          echo ""
          echo "🎉 Your SarvCast application has been deployed and optimized!"
          echo ""
          echo "🔧 What was done:"
          echo "  ✅ Files synced to server via SSH (rsync)"
          echo "  ✅ Public images directories created"
          echo "  ✅ Permissions set correctly"
          echo "  ✅ Image directories configured"
          echo "  ✅ Composer dependencies installed/updated"
          echo "  ✅ Laravel caches cleared and optimized"
          echo "  ✅ Database migrations run"
          echo "  ✅ Application optimized for production"

      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: 7488407974:AAFl4Ek9IanbvlkKlRoikQAqdkDtFYbD0Gc
          TELEGRAM_CHAT_ID: -1002796302613_97
          GITHUB_ACTOR: ${{ github.actor }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          FORMATTED_COMMIT_MESSAGE=$(echo "${COMMIT_MESSAGE}" | sed 's/$/\\n/' | sed ':a;N;$!ba;s/\n/\\n/g')
          MESSAGE=$(echo -e "😎 <b>SarvCast Admin Dashboard</b> 😎\n\n👌 <b>Status:</b> Deployment Complete\n\n👤 <b>User:</b> ${GITHUB_ACTOR}\n <blockquote>${FORMATTED_COMMIT_MESSAGE}</blockquote>")
          curl -s -X POST https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage \
            -d chat_id=${TELEGRAM_CHAT_ID} \
            -d text="${MESSAGE}" \
            -d parse_mode="HTML"
