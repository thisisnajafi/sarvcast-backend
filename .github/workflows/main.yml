on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_full_deploy:
        description: Run all deploy steps (vendor, env, migrate, cache, firebase)
        type: boolean
        default: false
      force_env:
        description: Upload production .env
        type: boolean
        default: false
      force_vendor:
        description: Rebuild and upload vendor.zip
        type: boolean
        default: false
      force_firebase:
        description: Run firebase:verify on server
        type: boolean
        default: false

name: Deploy Laravel Backend via FTP

# Deploy is additive only: migrate --force (never fresh/wipe), storage and .env are
# excluded from deploy.zip and protected during server-side extract.

# Prevent overlapping deploys; a new push cancels a slow in-progress upload.
concurrency:
  group: manji-backend-deploy
  cancel-in-progress: true


env:
  # true  = skip post-deploy steps unless related files changed (faster code-only deploys)
  # false = always run .env, config:clear, firebase, migrate, and cache rebuild after FTP
  LEAN_DEPLOY: "false"
  FTP_SERVER: "ftp.manjiapp.ir"
  FTP_USERNAME: "my@manjiapp.ir"
  FTP_PASSWORD: "Prof48017421@#"
  SITE_URL: "https://my.manjiapp.ir"
  DEPLOY_TOKEN: "manji-ftp-deploy-x7k9m2"
  TELEGRAM_BOT_TOKEN: "7488407974:AAFl4Ek9IanbvlkKlRoikQAqdkDtFYbD0Gc"
  TELEGRAM_CHAT_ID: "-1002796302613_97"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            composer:
              - 'composer.json'
              - 'composer.lock'
            migrations:
              - 'database/migrations/**'
            seeders:
              - 'database/seeders/**'
            env:
              - '.github/production.env.template'
              - 'scripts/prepare-production-env.sh'
            config:
              - 'config/**'
              - 'bootstrap/app.php'
            routes:
              - 'routes/**'
            views:
              - 'resources/views/**'
            firebase:
              - 'config/firebase.php'
              - 'app/**/Firebase*'
              - 'app/Services/*Firebase*'
              - 'storage/app/firebase-service-account.json'
              - 'storage/app/*-firebase-adminsdk*.json'
            deploy_scripts:
              - 'public/_deploy_helper.php'
              - 'scripts/extract-deploy.php'
              - 'scripts/prepare-ftp-deploy.sh'
              - 'htaccess'
              - 'public/htaccess'

      - name: Plan deploy steps
        id: plan
        run: |
          force_env="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_env == 'true' }}"
          force_vendor="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_vendor == 'true' }}"
          force_firebase="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_firebase == 'true' }}"
          lean_deploy="${{ env.LEAN_DEPLOY }}"

          if [[ "$lean_deploy" == "false" ]]; then
            echo "LEAN_DEPLOY=false — full deploy: vendor, env, cache clear, firebase, migrate, cache rebuild"
            echo "run_composer=true" >> "$GITHUB_OUTPUT"
            echo "run_env=true" >> "$GITHUB_OUTPUT"
            echo "run_config_clear=true" >> "$GITHUB_OUTPUT"
            echo "run_firebase=true" >> "$GITHUB_OUTPUT"
            echo "run_migrate=true" >> "$GITHUB_OUTPUT"
            echo "run_seed=true" >> "$GITHUB_OUTPUT"
            echo "run_cache_rebuild=true" >> "$GITHUB_OUTPUT"
          else
            echo "LEAN_DEPLOY=true — post-deploy steps depend on changed paths"
            force_full="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_full_deploy == 'true' }}"

            if [[ "$force_full" == "true" ]] || [[ "${{ steps.changes.outputs.composer }}" == "true" ]] || [[ "$force_vendor" == "true" ]]; then
              echo "run_composer=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_composer=false" >> "$GITHUB_OUTPUT"
            fi

            if [[ "$force_full" == "true" ]] || [[ "${{ steps.changes.outputs.env }}" == "true" ]] || [[ "$force_env" == "true" ]]; then
              echo "run_env=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_env=false" >> "$GITHUB_OUTPUT"
            fi

            if [[ "$force_full" == "true" ]] || [[ "${{ steps.changes.outputs.composer }}" == "true" ]] || [[ "${{ steps.changes.outputs.env }}" == "true" ]] || [[ "${{ steps.changes.outputs.config }}" == "true" ]] || [[ "$force_vendor" == "true" ]] || [[ "$force_env" == "true" ]]; then
              echo "run_config_clear=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_config_clear=false" >> "$GITHUB_OUTPUT"
            fi

            if [[ "$force_full" == "true" ]] || [[ "${{ steps.changes.outputs.firebase }}" == "true" ]] || [[ "$force_firebase" == "true" ]]; then
              echo "run_firebase=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_firebase=false" >> "$GITHUB_OUTPUT"
            fi

            if [[ "$force_full" == "true" ]] || [[ "${{ steps.changes.outputs.migrations }}" == "true" ]]; then
              echo "run_migrate=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_migrate=false" >> "$GITHUB_OUTPUT"
            fi

            if [[ "$force_full" == "true" ]] || [[ "${{ steps.changes.outputs.seeders }}" == "true" ]]; then
              echo "run_seed=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_seed=false" >> "$GITHUB_OUTPUT"
            fi

            if [[ "$force_full" == "true" ]] || [[ "${{ steps.changes.outputs.config }}" == "true" ]] || [[ "${{ steps.changes.outputs.routes }}" == "true" ]] || [[ "${{ steps.changes.outputs.views }}" == "true" ]] || [[ "${{ steps.changes.outputs.migrations }}" == "true" ]] || [[ "${{ steps.changes.outputs.composer }}" == "true" ]]; then
              echo "run_cache_rebuild=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_cache_rebuild=false" >> "$GITHUB_OUTPUT"
            fi
          fi

          echo "Deploy plan:"
          echo "  composer/vendor: $(grep run_composer= "$GITHUB_OUTPUT" | cut -d= -f2)"
          echo "  .env upload:     $(grep run_env= "$GITHUB_OUTPUT" | cut -d= -f2)"
          echo "  config_clear:    $(grep run_config_clear= "$GITHUB_OUTPUT" | cut -d= -f2)"
          echo "  firebase_verify: $(grep run_firebase= "$GITHUB_OUTPUT" | cut -d= -f2)"
          echo "  migrate:         $(grep run_migrate= "$GITHUB_OUTPUT" | cut -d= -f2)"
          echo "  seed:            $(grep run_seed= "$GITHUB_OUTPUT" | cut -d= -f2)"
          echo "  cache_rebuild:   $(grep run_cache_rebuild= "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Setup PHP
        if: steps.plan.outputs.run_composer == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, json, bcmath, curl, gd, zip, intl, fileinfo, pdo, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        if: steps.plan.outputs.run_composer == 'true'
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        if: steps.plan.outputs.run_composer == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install production dependencies
        if: steps.plan.outputs.run_composer == 'true'
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Package vendor directory
        if: steps.plan.outputs.run_composer == 'true'
        run: |
          echo "Vendor size before packaging:"
          du -sh vendor
          (cd vendor && zip -r -9 -q ../vendor.zip .)
          ls -lh vendor.zip

      - name: Prepare FTP deploy bundle
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          DEPLOY_EXTRACT_TOKEN: ${{ env.DEPLOY_TOKEN }}
          ALLOW_MISSING_FIREBASE_BUNDLE: "true"
          SKIP_VENDOR_BUNDLE: ${{ steps.plan.outputs.run_composer == 'true' && 'false' || 'true' }}
        run: bash scripts/prepare-ftp-deploy.sh

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Deploy via FTPS (lftp)
        env:
          FTP_SERVER: ${{ env.FTP_SERVER }}
          FTP_USERNAME: ${{ env.FTP_USERNAME }}
          FTP_PASSWORD: ${{ env.FTP_PASSWORD }}
          FTP_SERVER_DIR: /
          DEPLOY_EXTRACT_TOKEN: ${{ env.DEPLOY_TOKEN }}
          SITE_URL: ${{ env.SITE_URL }}
          UPLOAD_VENDOR: ${{ steps.plan.outputs.run_composer }}
        run: |
          set -euo pipefail
          bash scripts/ftp-upload-deploy.sh

          echo "Extracting deploy.zip on server..."
          EXTRACT_OUT=$(curl -fsS --max-time 600 \
            "${SITE_URL}/extract-deploy.php?token=${DEPLOY_EXTRACT_TOKEN}")
          echo "${EXTRACT_OUT}"

          if ! echo "${EXTRACT_OUT}" | grep -q "Laravel deploy extracted successfully"; then
            echo "::error::Server extract-deploy.php did not complete successfully"
            exit 1
          fi

          echo "Deploy bundle extracted on server"

      - name: Clear server bootstrap cache (config:clear)
        if: steps.plan.outputs.run_config_clear == 'true'
        run: |
          bash scripts/ci-call-deploy-helper.sh \
            "${{ env.SITE_URL }}" \
            "${{ env.DEPLOY_TOKEN }}" \
            "only=config_clear" \
            "php artisan config:clear (via deploy helper)" \
            300

      - name: Prepare production .env for server
        if: steps.plan.outputs.run_env == 'true'
        env:
          PRODUCTION_DOTENV: ${{ secrets.PRODUCTION_DOTENV }}
          PRODUCTION_APP_KEY: ${{ secrets.PRODUCTION_APP_KEY }}
          PRODUCTION_DB_DATABASE: ${{ secrets.PRODUCTION_DB_DATABASE }}
          PRODUCTION_DB_USERNAME: ${{ secrets.PRODUCTION_DB_USERNAME }}
          PRODUCTION_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
          PRODUCTION_MELIPAYAMAK_USERNAME: ${{ secrets.PRODUCTION_MELIPAYAMAK_USERNAME }}
          PRODUCTION_MELIPAYAMAK_PASSWORD: ${{ secrets.PRODUCTION_MELIPAYAMAK_PASSWORD }}
          PRODUCTION_CAFEBAZAAR_API_KEY: ${{ secrets.PRODUCTION_CAFEBAZAAR_API_KEY }}
          PRODUCTION_MYKET_API_KEY: ${{ secrets.PRODUCTION_MYKET_API_KEY }}
          PRODUCTION_ZARINPAL_MERCHANT_ID: ${{ secrets.PRODUCTION_ZARINPAL_MERCHANT_ID }}
          FTP_SERVER: ${{ env.FTP_SERVER }}
          FTP_USERNAME: ${{ env.FTP_USERNAME }}
          FTP_PASSWORD: ${{ env.FTP_PASSWORD }}
          DOWNLOAD_SERVER_ENV: "true"
        run: bash scripts/prepare-production-env.sh

      - name: Upload production .env to server
        if: steps.plan.outputs.run_env == 'true'
        run: |
          set -euo pipefail
          lftp -u "${{ env.FTP_USERNAME }},${{ env.FTP_PASSWORD }}" "${{ env.FTP_SERVER }}" -e "
            set ftp:passive-mode true;
            set ftp:ssl-allow true;
            set ftp:ssl-force true;
            set ssl:verify-certificate no;
            set ssl:check-hostname no;
            set cmd:fail-exit yes;
            lcd deploy-upload;
            cd /;
            put -O . .env;
            bye;
          "
          echo "Uploaded production .env ($(wc -c < deploy-upload/.env) bytes)"

      - name: Clear server cache after .env upload
        if: steps.plan.outputs.run_env == 'true'
        run: |
          bash scripts/ci-call-deploy-helper.sh \
            "${{ env.SITE_URL }}" \
            "${{ env.DEPLOY_TOKEN }}" \
            "only=config_clear" \
            "Clear bootstrap cache after .env upload" \
            300

      - name: Run php artisan firebase:verify --clear-cache on server
        if: steps.plan.outputs.run_firebase == 'true'
        run: |
          bash scripts/ci-call-deploy-helper.sh \
            "${{ env.SITE_URL }}" \
            "${{ env.DEPLOY_TOKEN }}" \
            "only=firebase_verify" \
            "php artisan firebase:verify --clear-cache (via deploy helper)" \
            300

      - name: Run php artisan migrate --force on server
        if: steps.plan.outputs.run_migrate == 'true'
        run: |
          QUERY="only=migrate"
          if [[ "${{ steps.plan.outputs.run_seed }}" == "true" ]]; then
            QUERY="${QUERY}&seed=1"
          fi

          bash scripts/ci-call-deploy-helper.sh \
            "${{ env.SITE_URL }}" \
            "${{ env.DEPLOY_TOKEN }}" \
            "${QUERY}" \
            "php artisan migrate --force (via deploy helper)" \
            600

      - name: Rebuild Laravel caches on server
        if: steps.plan.outputs.run_cache_rebuild == 'true'
        run: |
          bash scripts/ci-call-deploy-helper.sh \
            "${{ env.SITE_URL }}" \
            "${{ env.DEPLOY_TOKEN }}" \
            "only=cache_rebuild" \
            "Laravel cache rebuild (via deploy helper)" \
            600

      - name: Verify production site responds
        run: |
          set -euo pipefail
          for path in "/" "/api/v1/health"; do
            code=$(curl -sS -o /tmp/manji-body.txt -w "%{http_code}" \
              "${{ env.SITE_URL }}${path}" --max-time 60)
            echo "${{ env.SITE_URL }}${path} → HTTP ${code}"
            if [[ "${path}" == "/" && "${code}" == "403" ]]; then
              echo "::error::Homepage still returns 403 — check root .htaccess routes / to public/index.php"
              exit 1
            fi
            if [[ "${path}" == "/" && ! "${code}" =~ ^(200|302|301)$ ]]; then
              echo "::error::Homepage returned unexpected HTTP ${code}"
              exit 1
            fi
            if [[ "${path}" == "/api/v1/health" && ! "${code}" =~ ^(200|503)$ ]]; then
              echo "::error::Health endpoint returned HTTP ${code}"
              head -c 500 /tmp/manji-body.txt || true
              exit 1
            fi
          done
          echo "OK: site smoke checks passed"

      - name: Notify Telegram (success)
        if: success()
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -c 200)
          COMMIT_HASH=$(git rev-parse --short HEAD)
          AUTHOR=$(git log -1 --pretty=%an)

          TEXT="✅ *Manji Backend Deployed*

          📦 Commit: \`${COMMIT_HASH}\`
          👤 Author: ${AUTHOR}
          📝 ${COMMIT_MSG}

          🔗 ${{ env.SITE_URL }}"

          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
            -d text="$TEXT" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview=true || true

      - name: Notify Telegram (failure)
        if: failure()
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          AUTHOR=$(git log -1 --pretty=%an)

          TEXT="❌ *Manji Backend Deploy Failed*

          📦 Commit: \`${COMMIT_HASH}\`
          👤 Author: ${AUTHOR}

          🔗 [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
            -d text="$TEXT" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview=true || true
