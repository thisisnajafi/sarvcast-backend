name: SarvCast Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Setup MySQL
        uses: mirromutth/mysql-action@v1.1
        with:
          mysql version: '8.0'
          mysql root password: 'iWY]RgUhnqiu'
          mysql database: 'h273779_lgb'
          mysql user: 'h273779_lgb'
          mysql host: 'localhost'
          mysql password: 'iWY]RgUhnqiu'

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install dependencies
        env:
          BROADCAST_DRIVER: log
          PUSHER_APP_KEY: dummy_key
          PUSHER_APP_SECRET: dummy_secret
          PUSHER_APP_ID: dummy_id
          PUSHER_APP_CLUSTER: mt1
        run: composer install

      # - name: Copy .env
      #   env:
      #     BROADCAST_DRIVER: log
      #     PUSHER_APP_KEY: dummy_key
      #     PUSHER_APP_SECRET: dummy_secret
      #     PUSHER_APP_ID: dummy_id
      #     PUSHER_APP_CLUSTER: mt1
      #   run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      # - name: Configure database for GitHub Actions
      #   run: |
      #     # Update .env file with GitHub Actions database credentials
      #     sed -i 's/DB_HOST=.*/DB_HOST=localhost/' .env
      #     sed -i 's/DB_PORT=.*/DB_PORT=3306/' .env
      #     sed -i 's/DB_DATABASE=.*/DB_DATABASE=h273779_lgb/' .env
      #     sed -i 's/DB_USERNAME=.*/DB_USERNAME=h273779_lgb/' .env
      #     sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=iWY]RgUhnqiu/' .env

      - name: Generate key
        env:
          BROADCAST_DRIVER: log
          PUSHER_APP_KEY: dummy_key
          PUSHER_APP_SECRET: dummy_secret
          PUSHER_APP_ID: dummy_id
          PUSHER_APP_CLUSTER: mt1
        run: php artisan key:generate --force

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Create Public Images Directories
        run: |
          echo "📁 Creating public images directories..."
          mkdir -p public/images/categories
          mkdir -p public/images/stories
          mkdir -p public/images/episodes
          mkdir -p public/images/people
          mkdir -p public/images/users
          mkdir -p public/images/playlists
          mkdir -p public/images/timeline
          echo "✅ Public images directories created successfully"

      - name: Set Public Images Permissions
        run: |
          echo "🔐 Setting public images permissions..."
          chmod -R 755 public/images
          echo "✅ Public images permissions set successfully"

      - name: Test Database Connection
        run: |
          echo "🔍 Testing database connection..."
          php artisan tinker --execute="echo 'Database connection: ' . (DB::connection()->getPdo() ? 'OK' : 'FAILED') . PHP_EOL;"


      - name: Pre-deployment Cache Clear
        run: |
          echo "🧹 Clearing pre-deployment caches..."
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear
          echo "✅ Pre-deployment caches cleared"

      - name: Setup SSH Key
        run: |
          echo "🔑 Setting up SSH key for deployment..."
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Write SSH private key using printf to preserve exact formatting
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Validate key format
          echo "🔍 Validating SSH key format..."
          if ! grep -q "BEGIN.*PRIVATE KEY" ~/.ssh/deploy_key; then
            echo "❌ ERROR: SSH key does not contain BEGIN marker"
            echo "First 100 characters of key:"
            head -c 100 ~/.ssh/deploy_key
            exit 1
          fi
          
          if ! grep -q "END.*PRIVATE KEY" ~/.ssh/deploy_key; then
            echo "❌ ERROR: SSH key does not contain END marker"
            echo "Last 100 characters of key:"
            tail -c 100 ~/.ssh/deploy_key
            exit 1
          fi

          # Ensure proper line endings (remove Windows CRLF)
          sed -i 's/\r$//' ~/.ssh/deploy_key
          
          # Remove any trailing newlines that might cause issues
          sed -i -e :a -e '/^\n*$/{$d;N;ba' -e '}' ~/.ssh/deploy_key

          # Verify key file permissions
          ls -la ~/.ssh/deploy_key

          # Add server to known hosts
          ssh-keyscan -H ${{ secrets.SSH_HOST }} -p ${{ secrets.SSH_PORT || 22 }} >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts

          # Test SSH key format with ssh-keygen
          echo "🔍 Testing SSH key format..."
          ssh-keygen -l -f ~/.ssh/deploy_key > /dev/null 2>&1 && echo "✅ SSH key format is valid" || {
            echo "❌ ERROR: SSH key format is invalid"
            echo "Key file size: $(wc -c < ~/.ssh/deploy_key) bytes"
            echo "First 5 lines:"
            head -5 ~/.ssh/deploy_key
            exit 1
          }

          # Test SSH connection
          echo "🔍 Testing SSH connection..."
          ssh -v -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            -o PasswordAuthentication=no \
            -p ${{ secrets.SSH_PORT || 22 }} \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "echo 'SSH connection successful'" 2>&1 | head -20 || {
            echo "❌ SSH connection test failed"
            echo "Please verify:"
            echo "  1. SSH_PRIVATE_KEY secret contains the complete private key"
            echo "  2. Public key is added to server's ~/.ssh/authorized_keys"
            echo "  3. SSH_USERNAME and SSH_HOST are correct"
            exit 1
          }

          echo "✅ SSH key configured and tested"

      - name: 📂 Sync files via SSH (rsync)
        run: |
          echo "📤 Syncing files to server via SSH (rsync)..."
          echo "📍 Target: ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.APP_PATH || '/public_html/my' }}/"

          # Use rsync with proper SSH options
          rsync -avz --delete --progress \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -o IdentitiesOnly=yes -o PasswordAuthentication=no -p ${{ secrets.SSH_PORT || 22 }}" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='phpunit.xml' \
            --exclude='*.md' \
            --exclude='.styleci.yml' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='bootstrap/cache/*' \
            --exclude='vendor' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            --exclude='Homestead.yaml' \
            --exclude='Homestead.json' \
            --exclude='Vagrantfile' \
            --exclude='*.log' \
            ./ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.APP_PATH || '/public_html/my' }}/

          if [ $? -eq 0 ]; then
            echo "✅ Files synced successfully!"
          else
            echo "❌ File sync failed!"
            exit 1
          fi

      - name: Run Post-Deployment Commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "🚀 Starting post-deployment setup..."

            # Navigate to application directory
            cd ${{ secrets.APP_PATH || '/public_html/my' }}

            echo "📦 Installing/updating Composer dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "🧹 Clearing Laravel caches..."
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan cache:clear

            echo "🔄 Running database migrations..."
            php artisan migrate --force

            echo "⚡ Optimizing Laravel for production..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan optimize

            echo "🔐 Setting proper permissions..."
            chmod -R 755 storage bootstrap/cache
            chmod -R 755 public/images

            echo "🔗 Creating storage symlink (if needed)..."
            php artisan storage:link || true

            echo "✅ Post-deployment setup completed successfully!"

      - name: Cleanup SSH Key
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          echo "🧹 SSH key cleaned up"

      - name: Verify deployment
        run: |
          echo "✅ Deployment verification..."
          echo "📋 Deployment completed successfully!"
          echo ""
          echo "🎉 Your SarvCast application has been deployed and optimized!"
          echo ""
          echo "🔧 What was done:"
          echo "  ✅ Files synced to server via SSH (rsync)"
          echo "  ✅ Public images directories created"
          echo "  ✅ Permissions set correctly"
          echo "  ✅ Image directories configured"
          echo "  ✅ Composer dependencies installed/updated"
          echo "  ✅ Laravel caches cleared and optimized"
          echo "  ✅ Database migrations run"
          echo "  ✅ Application optimized for production"

      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: 7488407974:AAFl4Ek9IanbvlkKlRoikQAqdkDtFYbD0Gc
          TELEGRAM_CHAT_ID: -1002796302613_97
          GITHUB_ACTOR: ${{ github.actor }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          FORMATTED_COMMIT_MESSAGE=$(echo "${COMMIT_MESSAGE}" | sed 's/$/\\n/' | sed ':a;N;$!ba;s/\n/\\n/g')
          MESSAGE=$(echo -e "😎 <b>SarvCast Admin Dashboard</b> 😎\n\n👌 <b>Status:</b> Deployment Complete\n\n👤 <b>User:</b> ${GITHUB_ACTOR}\n <blockquote>${FORMATTED_COMMIT_MESSAGE}</blockquote>")
          curl -s -X POST https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage \
            -d chat_id=${TELEGRAM_CHAT_ID} \
            -d text="${MESSAGE}" \
            -d parse_mode="HTML"
