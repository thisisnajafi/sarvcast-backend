openapi: 3.0.3
info:
  title: SarvCast Admin API — Coins (Dashboard)
  description: Contract for coin transaction management under /api/admin/coins
  version: 1.0.0

servers:
  - url: https://example.com/api/admin
    description: Production (replace host)
  - url: http://localhost:8000/api/admin
    description: Local

security:
  - bearerAuth: []

paths:
  /coins:
    get:
      summary: List coin transactions (paginated)
      tags: [Admin — Coins]
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: perPage
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: q
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
        - name: type
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [created_at, id, amount, type, status]
            default: created_at
        - name: sortDir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: dateFrom
          in: query
          schema: { type: string, format: date }
        - name: dateTo
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinListResponse"
    post:
      summary: Create coin transaction
      tags: [Admin — Coins]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoinCreateRequest"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinMutationResponse"

  /coins/export:
    get:
      summary: Export coin transactions as CSV (same filters as list)
      tags: [Admin — Coins]
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: type
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: CSV stream
          content:
            text/csv:
              schema:
                type: string
                format: binary

  /coins/statistics/data:
    get:
      summary: Coin statistics
      tags: [Admin — Coins]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinStatisticsResponse"

  /coins/bulk-action:
    post:
      summary: Bulk approve / reject / delete
      tags: [Admin — Coins]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, selected_items]
              properties:
                action:
                  type: string
                  enum: [delete, approve, reject]
                selected_items:
                  type: array
                  items: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /coins/{id}:
    get:
      summary: Coin transaction detail
      tags: [Admin — Coins]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinDetailResponse"
    put:
      summary: Update coin transaction
      tags: [Admin — Coins]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoinUpdateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinMutationResponse"
    delete:
      summary: Delete coin transaction
      tags: [Admin — Coins]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  schemas:
    CoinListResponse:
      type: object
      required: [success, data, meta, pagination]
      properties:
        success: { type: boolean, example: true }
        data:
          type: array
          items: { $ref: "#/components/schemas/CoinTransaction" }
        meta:
          type: object
          required: [page, perPage, total, lastPage]
          properties:
            page: { type: integer }
            perPage: { type: integer }
            total: { type: integer }
            lastPage: { type: integer }
        pagination:
          type: object
          properties:
            current_page: { type: integer }
            last_page: { type: integer }
            per_page: { type: integer }
            total: { type: integer }

    CoinDetailResponse:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean }
        data: { $ref: "#/components/schemas/CoinTransaction" }

    CoinMutationResponse:
      type: object
      required: [success, message, data]
      properties:
        success: { type: boolean }
        message: { type: string }
        data: { $ref: "#/components/schemas/CoinTransaction" }

    CoinStatisticsResponse:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            stats: { type: object }
            daily_stats:
              type: array
              items: { type: object }

    MessageResponse:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }

    CoinTransaction:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        amount: { type: integer }
        type: { type: string }
        status: { type: string }
        description: { type: string, nullable: true }
        created_at: { type: string, format: date-time, nullable: true }

    CoinCreateRequest:
      type: object
      required: [user_id, amount, type]
      properties:
        user_id: { type: integer }
        amount: { type: integer, minimum: 1 }
        type:
          type: string
          enum: [earned, purchased, gift, refund, admin_adjustment]
        description: { type: string }

    CoinUpdateRequest:
      type: object
      required: [amount, type, status]
      properties:
        amount: { type: integer, minimum: 1 }
        type:
          type: string
          enum: [earned, purchased, gift, refund, admin_adjustment]
        description: { type: string, nullable: true }
        status:
          type: string
          enum: [pending, completed, failed]
