; Manji Laravel — local PHP config for LiteSpeed web SAPI.
; Loaded via SetEnv PHPRC in .htaccess. Order matters: mysqlnd before pdo_mysql, xml before dom.
[PHP]
engine = On
extension_dir = "/opt/cpanel/ea-php82/root/usr/lib64/php/modules"
extension = xml
extension = dom
extension = tokenizer
extension = mbstring
extension = mysqlnd
extension = pdo
extension = pdo_mysql
extension = curl
extension = fileinfo
extension = zip
extension = bcmath
extension = gd
extension = intl
