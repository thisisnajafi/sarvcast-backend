; Manji Laravel — local PHP config when LiteSpeed ignores cPanel PHP Selector.
; Loaded via SetEnv PHPRC in root .htaccess (directory containing this file).
[PHP]
engine = On
extension_dir = "/opt/cpanel/ea-php82/root/usr/lib64/php/modules"
extension = xml
extension = dom
extension = tokenizer
extension = mbstring
extension = pdo
extension = pdo_mysql
extension = curl
extension = fileinfo
extension = zip
extension = bcmath
extension = gd
